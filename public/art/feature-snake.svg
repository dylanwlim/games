<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Modern Snake gameplay board</title>
  <desc id="desc">A dark neon grid with a smooth green snake turning toward a glowing red apple.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14231f"/>
      <stop offset="0.52" stop-color="#0a1320"/>
      <stop offset="1" stop-color="#07101a"/>
    </linearGradient>
    <radialGradient id="fieldGlow" cx="28%" cy="22%" r="64%">
      <stop offset="0" stop-color="#83e46f" stop-opacity="0.2"/>
      <stop offset="0.54" stop-color="#3abf5c" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="appleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff9a8d" stop-opacity="0.9"/>
      <stop offset="0.56" stop-color="#ff5f55" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ff5f55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="snakeStroke" x1="286" x2="1288" y1="628" y2="284" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4eaa58"/>
      <stop offset="0.45" stop-color="#75d66c"/>
      <stop offset="1" stop-color="#b7fb96"/>
    </linearGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1.5"/>
    </pattern>
    <filter id="snakeShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#83e46f" flood-opacity="0.28"/>
    </filter>
    <filter id="appleShadow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#ff6f63" flood-opacity="0.48"/>
    </filter>
  </defs>
  <rect width="1672" height="941" fill="url(#bg)"/>
  <rect width="1672" height="941" fill="url(#fieldGlow)"/>
  <rect x="86" y="74" width="1500" height="793" rx="54" fill="#0a1320" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="132" y="120" width="1408" height="701" rx="42" fill="url(#grid)" opacity="0.95"/>
  <rect x="132" y="120" width="1408" height="701" rx="42" fill="none" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>
  <path d="M132 120h1408v701H132z" fill="none" stroke="#83e46f" stroke-opacity="0.08" stroke-width="26"/>
  <g opacity="0.9">
    <rect x="168" y="154" width="178" height="54" rx="27" fill="#0f1a28" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="204" cy="181" r="8" fill="#83e46f"/>
    <rect x="224" y="172" width="82" height="18" rx="9" fill="#f7f8fb" opacity="0.82"/>
    <rect x="1294" y="154" width="202" height="54" rx="27" fill="#0f1a28" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="1328" y="172" width="126" height="18" rx="9" fill="#83e46f" opacity="0.7"/>
  </g>
  <path d="M268 650c164 0 210-126 358-126 174 0 178 150 346 150 160 0 172-292 334-292" fill="none" stroke="#1d4029" stroke-width="96" stroke-linecap="round" stroke-linejoin="round" opacity="0.44"/>
  <path d="M268 650c164 0 210-126 358-126 174 0 178 150 346 150 160 0 172-292 334-292" fill="none" stroke="url(#snakeStroke)" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" filter="url(#snakeShadow)"/>
  <path d="M304 638c128-14 183-90 304-92" fill="none" stroke="#dcffc7" stroke-opacity="0.18" stroke-width="22" stroke-linecap="round"/>
  <g filter="url(#snakeShadow)">
    <circle cx="1318" cy="366" r="52" fill="#93ef7d"/>
    <path d="M1286 340c22-22 64-18 86 4" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round"/>
    <circle cx="1336" cy="350" r="7" fill="#0b1c12"/>
    <circle cx="1354" cy="374" r="7" fill="#0b1c12"/>
  </g>
  <g filter="url(#appleShadow)">
    <circle cx="1430" cy="248" r="70" fill="url(#appleGlow)" opacity="0.82"/>
    <circle cx="1430" cy="248" r="38" fill="#ff5f55"/>
    <circle cx="1418" cy="236" r="9" fill="#ffd5cf" opacity="0.78"/>
    <path d="M1431 206c8-17 20-27 36-31" fill="none" stroke="#6b3f24" stroke-width="9" stroke-linecap="round"/>
    <ellipse cx="1462" cy="202" rx="19" ry="10" fill="#83e46f" transform="rotate(-28 1462 202)"/>
  </g>
  <g opacity="0.24">
    <path d="M246 750c270-66 477-52 646 13 170 65 362 72 578-28" fill="none" stroke="#83e46f" stroke-width="18" stroke-linecap="round"/>
    <circle cx="466" cy="276" r="10" fill="#83e46f"/>
    <circle cx="538" cy="276" r="6" fill="#83e46f"/>
    <circle cx="610" cy="276" r="4" fill="#83e46f"/>
  </g>
</svg>
